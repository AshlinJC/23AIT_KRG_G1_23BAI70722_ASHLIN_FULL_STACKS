server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:livepolldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: YOUR_GOOGLE_CLIENT_ID        # Replace with real value
            client-secret: YOUR_GOOGLE_CLIENT_SECRET # Replace with real value
            scope:
              - email
              - profile

jwt:
  secret: TXlWZXJ5TG9uZ0p3dFNlY3JldEtleUZvckxpdmVQb2xsMjAyNFNlY3VyaXR5IQ==
  expiration: 86400000   # 24 hours in milliseconds

logging:
  level:
    org.springframework.security: DEBUG
    com.livepoll: DEBUG
